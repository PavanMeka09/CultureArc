apiVersion: v1
kind: Secret
metadata:
  name: culturearc-secrets
type: Opaque
stringData:
  # Injection of your database & external service credentials
  MONGO_URI: "YOUR_MONGO_URI_HERE"
  JWT_SECRET: "YOUR_JWT_SECRET_HERE"
  CLOUDINARY_CLOUD_NAME: "YOUR_CLOUDINARY_CLOUD_NAME_HERE"
  CLOUDINARY_API_KEY: "YOUR_CLOUDINARY_API_KEY_HERE"
  CLOUDINARY_API_SECRET: "YOUR_CLOUDINARY_API_SECRET_HERE"
  EMAIL_USER: "YOUR_EMAIL_USER_HERE"
  EMAIL_PASS: "YOUR_EMAIL_PASS_HERE"
  GOOGLE_GENERATIVE_AI_API_KEY: "YOUR_GOOGLE_GENERATIVE_AI_API_KEY_HERE"

---

# Express Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: culturearc-backend
  labels:
    app: culturearc-backend
spec:
  replicas: 1 # Simple single pod setup
  selector:
    matchLabels:
      app: culturearc-backend
  template:
    metadata:
      labels:
        app: culturearc-backend
    spec:
      containers:
      - name: backend
        image: pavanmeka09/culturearc-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        envFrom:
        - secretRef:
            name: culturearc-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---

# Express Backend LoadBalancer Service (Maps port 5000 to Host Port 5000)
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: culturearc-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: LoadBalancer

---

# React Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: culturearc-frontend
  labels:
    app: culturearc-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: culturearc-frontend
  template:
    metadata:
      labels:
        app: culturearc-frontend
    spec:
      containers:
      - name: frontend
        image: pavanmeka09/culturearc-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---

# React Frontend LoadBalancer Service (Maps port 80 to Host Port 80)
apiVersion: v1
kind: Service
metadata:
  name: culturearc-frontend-service
spec:
  selector:
    app: culturearc-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
